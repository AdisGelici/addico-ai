<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Addico AI Assistent</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
background:linear-gradient(135deg,#eef4ff 0%,#f8fff9 100%);
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-wrapper{
width:420px;
max-width:94vw;
height:700px;
max-height:92vh;
background:white;
border-radius:26px;
overflow:hidden;
box-shadow:0 18px 45px rgba(15,23,42,0.18);
display:flex;
flex-direction:column;
animation:popIn .45s ease;
}

@keyframes popIn{
from{opacity:0;transform:translateY(18px) scale(.97);}
to{opacity:1;transform:translateY(0) scale(1);}
}

.chat-header{
background:linear-gradient(135deg,#2158a8 0%,#22C55E 100%);
padding:22px;
color:white;
}

.chat-title{
font-size:23px;
font-weight:800;
}

.chat-subtitle{
font-size:13px;
opacity:.9;
margin-top:5px;
}

.chat-messages{
flex:1;
padding:20px;
overflow-y:auto;
background:#ffffff;
scroll-behavior:smooth;
}

.message{
padding:14px 16px;
border-radius:18px;
margin-bottom:14px;
max-width:82%;
line-height:1.5;
font-size:15px;
animation:messageIn .25s ease;
white-space:pre-wrap;
}

@keyframes messageIn{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;transform:translateY(0);}
}

.bot{
background:#eef4ff;
color:#111827;
border-bottom-left-radius:6px;
}

.user{
background:#2158a8;
color:white;
margin-left:auto;
border-bottom-right-radius:6px;
}

.typing{
display:flex;
gap:5px;
align-items:center;
width:max-content;
}

.typing span{
width:7px;
height:7px;
background:#6b7280;
border-radius:50%;
animation:bounce 1.2s infinite;
}

.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}

@keyframes bounce{
0%,80%,100%{transform:translateY(0);opacity:.4;}
40%{transform:translateY(-5px);opacity:1;}
}

.chat-input{
display:flex;
gap:10px;
border-top:1px solid #e5e7eb;
padding:13px;
background:white;
}

.chat-input input{
flex:1;
padding:14px;
border:1px solid #d1d5db;
border-radius:15px;
font-size:15px;
outline:none;
transition:.2s;
}

.chat-input input:focus{
border-color:#2158a8;
box-shadow:0 0 0 3px rgba(33,88,168,.12);
}

.chat-input button{
border:none;
background:linear-gradient(135deg,#F59E0B 0%,#22C55E 100%);
color:white;
padding:14px 19px;
border-radius:15px;
cursor:pointer;
font-size:15px;
font-weight:800;
transition:.2s;
}

.chat-input button:hover{
transform:translateY(-1px);
box-shadow:0 8px 18px rgba(34,197,94,.25);
}

.chat-input button:disabled{
opacity:.6;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

.notice{
padding:13px 18px;
font-size:12.5px;
background:#f9fafb;
color:#6b7280;
border-top:1px solid #e5e7eb;
line-height:1.45;
}

@media(max-width:520px){
body{
align-items:stretch;
height:100dvh;
}

.chat-wrapper{
width:100%;
max-width:100%;
height:100dvh;
max-height:100dvh;
border-radius:0;
}

.chat-header{
padding:19px;
}

.chat-title{
font-size:21px;
}
}
</style>
</head>

<body>

<div class="chat-wrapper">

<div class="chat-header">
<div class="chat-title">Addico AI Assistent</div>
<div class="chat-subtitle">Stel uw vraag over BKR, EVR, IVR of onze werkwijze</div>
</div>

<div class="chat-messages" id="messages">
<div class="message bot">Hallo! Waarmee kan ik u helpen?</div>
</div>

<div class="chat-input">
<input id="userInput" type="text" placeholder="Typ uw bericht..." autocomplete="off">
<button id="sendButton" onclick="sendMessage()">Verstuur</button>
</div>

<div class="notice">
Deze AI-chat geeft algemene informatie en geen garanties. Komt u er niet uit? Neem dan contact op met Addico.
</div>

</div>

<script>
const input = document.getElementById("userInput");
const button = document.getElementById("sendButton");
const messages = document.getElementById("messages");

input.addEventListener("keydown", function(e){
if(e.key === "Enter"){
sendMessage();
}
});

function escapeHTML(str){
return str.replace(/[&<>'"]/g, tag => ({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
"'":"&#39;",
'"':"&quot;"
}[tag]));
}

async function sendMessage(){

const text = input.value.trim();
if(!text) return;

messages.innerHTML += `<div class="message user">${escapeHTML(text)}</div>`;

input.value = "";
button.disabled = true;

messages.innerHTML += `
<div class="message bot typing" id="typing">
<span></span><span></span><span></span>
</div>
`;

messages.scrollTop = messages.scrollHeight;

try{

const response = await fetch("/api/chat", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await response.json();

document.getElementById("typing")?.remove();

messages.innerHTML += `
<div class="message bot">${escapeHTML(data.reply || "Ik kan hier momenteel geen antwoord op geven.")}</div>
`;

} catch(error){

document.getElementById("typing")?.remove();

messages.innerHTML += `
<div class="message bot">Er ging iets mis. Neem gerust contact op met Addico.</div>
`;

}

button.disabled = false;
input.focus();
messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>

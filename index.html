<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Addico AI Assistent</title>

<style>

body{
margin:0;
background:#f4f7fb;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-wrapper{
width:420px;
height:700px;
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.chat-header{
background:linear-gradient(135deg,#2158a8 0%, #22C55E 100%);
padding:22px;
color:white;
font-size:24px;
font-weight:bold;
}

.chat-messages{
flex:1;
padding:20px;
overflow-y:auto;
background:#ffffff;
}

.message{
padding:14px 16px;
border-radius:18px;
margin-bottom:14px;
max-width:80%;
line-height:1.5;
font-size:15px;
}

.bot{
background:#edf2ff;
color:#111827;
}

.user{
background:#2158a8;
color:white;
margin-left:auto;
}

.chat-input{
display:flex;
border-top:1px solid #e5e7eb;
padding:12px;
background:white;
}

.chat-input input{
flex:1;
padding:14px;
border:1px solid #d1d5db;
border-radius:14px;
font-size:15px;
outline:none;
}

.chat-input button{
margin-left:10px;
border:none;
background:#22C55E;
color:white;
padding:14px 20px;
border-radius:14px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.notice{
padding:14px 18px;
font-size:13px;
background:#f9fafb;
color:#6b7280;
border-top:1px solid #e5e7eb;
line-height:1.5;
}

</style>

</head>

<body>

<div class="chat-wrapper">

<div class="chat-header">
Addico AI Assistent
</div>

<div class="chat-messages" id="messages">

<div class="message bot">
Hallo! Waarmee kan ik u helpen?
</div>

</div>

<div class="chat-input">

<input
id="userInput"
type="text"
placeholder="Typ uw bericht..."
>

<button onclick="sendMessage()">
Verstuur
</button>

</div>

<div class="notice">
Deze AI-chat geeft algemene informatie en geen garanties. Komt u er niet uit? Neem dan contact op met Addico.
</div>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const text = input.value;

if(!text) return;

messages.innerHTML += `
<div class="message user">
${text}
</div>
`;

input.value = "";

messages.innerHTML += `
<div class="message bot" id="typing">
Addico AI denkt na...
</div>
`;

messages.scrollTop = messages.scrollHeight;

const response = await fetch("/api/chat", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data = await response.json();

document.getElementById("typing").remove();

messages.innerHTML += `
<div class="message bot">
${data.reply}
</div>
`;

messages.scrollTop = messages.scrollHeight;

}

</script>

</body>
</html>
